<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 — Page Not Found · QuickTunnel</title>
        <link rel="stylesheet" href="/static/404.css" />
    </head>
    <body>
        <div class="bg">
            <div class="bg-grid"></div>
        </div>

        <div class="wrap">
            <header>
                <a href="/" class="logo">
                    <div class="logo-dot"></div>
                    QUICKTUNNEL
                </a>
                <nav class="nav">
                    <a href="https://github.com/tn3w/quicktunnel" target="_blank">GitHub</a>
                    <a href="https://github.com/tn3w/quicktunnel" target="_blank">Docs</a>
                </nav>
            </header>

            <main>
                <div class="hero">
                    <div class="stencil" aria-hidden="true">404</div>
                    <div class="hero-text">
                        <p class="eyebrow">Error 404</p>
                        <h1>Page Not Found</h1>
                        <p class="subtitle">
                            The resource you requested doesn't exist on this server — it may have
                            been moved, deleted, or the URL was typed incorrectly.
                        </p>
                    </div>
                </div>

                <div class="flow">
                    <div class="node ok">
                        <div class="node-icon">
                            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect
                                    x="3"
                                    y="4"
                                    width="14"
                                    height="9"
                                    rx="1"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                />
                                <path
                                    d="M1 15h18"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                    stroke-linecap="round"
                                />
                            </svg>
                        </div>
                        <div class="node-label">Client</div>
                    </div>

                    <div class="flow-line ok"></div>

                    <div class="node ok">
                        <div class="node-icon">
                            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle
                                    cx="10"
                                    cy="10"
                                    r="8"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                />
                                <ellipse
                                    cx="10"
                                    cy="10"
                                    rx="3.5"
                                    ry="8"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                />
                                <path
                                    d="M2 10h16"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                    stroke-linecap="round"
                                />
                            </svg>
                        </div>
                        <div class="node-label">Internet</div>
                    </div>

                    <div class="flow-line ok"></div>

                    <div class="node ok">
                        <div class="node-icon">
                            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect
                                    x="2"
                                    y="4"
                                    width="16"
                                    height="5"
                                    rx="1"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                />
                                <rect
                                    x="2"
                                    y="11"
                                    width="16"
                                    height="5"
                                    rx="1"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                />
                                <circle cx="15" cy="6.5" r="1" fill="currentColor" />
                                <circle cx="15" cy="13.5" r="1" fill="currentColor" />
                            </svg>
                        </div>
                        <div class="node-label">QuickTunnel</div>
                    </div>

                    <div class="flow-line err"></div>

                    <div class="node err">
                        <div class="node-icon">
                            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M5 3h7l4 4v10a1 1 0 01-1 1H5a1 1 0 01-1-1V4a1 1 0 011-1z"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                    stroke-linejoin="round"
                                />
                                <path
                                    d="M12 3v4h4"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                    stroke-linejoin="round"
                                />
                                <path
                                    d="M8 11h4M10 9v4"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                    stroke-linecap="round"
                                />
                            </svg>
                            <svg
                                class="error-badge"
                                width="12"
                                height="12"
                                viewBox="0 0 12 12"
                                fill="none"
                                xmlns="http://www.w3.org/2000/svg"
                            >
                                <circle cx="6" cy="6" r="6" fill="#ff4d4d" />
                                <path
                                    d="M4 4l4 4M8 4l-4 4"
                                    stroke="white"
                                    stroke-width="1.5"
                                    stroke-linecap="round"
                                />
                            </svg>
                        </div>
                        <div class="node-label">Page</div>
                    </div>
                </div>

                <div class="actions">
                    <a href="/" class="btn">
                        <svg
                            width="14"
                            height="14"
                            viewBox="0 0 14 14"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M6 10L3 7l3-3"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                            <path
                                d="M3 7h8"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                            />
                        </svg>
                        Back to Home
                    </a>
                </div>
            </main>
        </div>
    </body>
</html>
