name: Release Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build binary
        run: |
          if [ "${{ matrix.cross }}" == "true" ]; then
            cross build --manifest-path client/Cargo.toml --release --target ${{ matrix.target }}
          else
            cargo build --manifest-path client/Cargo.toml --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package binary
        id: package
        shell: bash
        run: |
          # Use names without version to ensure easy "latest" download links
          BIN_NAME="qtn-${{ matrix.target }}"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv "client/target/${{ matrix.target }}/release/qtn.exe" "$BIN_NAME.exe"
          else
            mv "client/target/${{ matrix.target }}/release/qtn" "$BIN_NAME"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: qtn-*
          retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd artifacts
          echo "### SHA256 Checksums" > checksums.txt
          sha256sum qtn-* >> checksums.txt
          echo "" >> checksums.txt

          echo "### SHA512 Checksums" >> checksums.txt
          sha512sum qtn-* >> checksums.txt

      - name: Sign Binaries
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          cd artifacts
          if [ -n "$SIGNING_KEY" ]; then
            eval $(ssh-agent -s)
            
            echo "$SIGNING_KEY" | ssh-add -
            
            for file in qtn-* checksums.txt; do
              ssh-keygen -Y sign -n "file" -f <(ssh-add -L) "$file"
            done
            
            ssh-agent -k
          else
            echo "No SIGNING_KEY secret found in env, skipping signature generation."
          fi

      - name: Release Note & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          make_latest: true
